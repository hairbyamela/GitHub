<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hair by Amela</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --dark: #1a1410;
    --mid: #3d2e22;
    --text: #2a1f14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Josefin Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,169,110,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 100% 100%, rgba(201,169,110,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative corner marks */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    opacity: 0.25;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 20px; left: 20px; }
  .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 60px 30px 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.9s ease both;
  }

  .monogram {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px;
    box-shadow: 0 4px 30px rgba(201,169,110,0.25);
    position: relative;
    overflow: hidden;
  }
  .monogram::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    opacity: 0.5;
    pointer-events: none;
  }
  .monogram img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 60% 15%;
    border-radius: 50%;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 300;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 0;
    width: 180px;
  }
  .divider span {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .divider span:last-child {
    background: linear-gradient(to left, transparent, var(--gold));
  }
  .divider-diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 22px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(201,169,110,0.25);
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    backdrop-filter: blur(6px);
    opacity: 0;
    transform: translateY(16px);
  }

  .link-item.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .link-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(90deg, rgba(201,169,110,0.12), transparent);
    transition: width 0.4s ease;
  }
  .link-item::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.3s ease;
  }

  .link-item:hover {
    background: rgba(255,255,255,0.8);
    border-color: rgba(201,169,110,0.6);
    transform: translateX(4px);
    box-shadow: 0 8px 30px rgba(201,169,110,0.15);
  }
  .link-item:hover::before { width: 100%; }
  .link-item:hover::after { transform: scaleY(1); }

  .link-icon {
    width: 36px; height: 36px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark);
    border-radius: 50%;
    transition: transform 0.3s ease;
  }
  .link-item:hover .link-icon { transform: scale(1.1) rotate(-5deg); }
  .link-icon svg { width: 17px; height: 17px; }

  .link-text {
    flex: 1;
    display: flex; flex-direction: column; gap: 2px;
  }
  .link-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 300;
  }
  .link-value {
    font-size: 14px;
    letter-spacing: 1.5px;
    color: var(--text);
    font-weight: 300;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
  }

  .arrow {
    color: var(--gold);
    font-size: 18px;
    opacity: 0;
    transform: translateX(-6px);
    transition: all 0.3s ease;
  }
  .link-item:hover .arrow { opacity: 1; transform: translateX(0); }

  /* Section labels */
  .section-label {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0 4px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .section-label.visible { opacity: 1; }
  .section-label span {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(201,169,110,0.7);
    font-weight: 300;
    white-space: nowrap;
  }
  .section-label::before, .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(201,169,110,0.2);
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(42,31,20,0.3);
    animation: fadeUp 1.2s 1.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
